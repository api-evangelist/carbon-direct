description: >-
  Carbon Direct does not publish a public or partner developer API, so there
  are no documented API rate limits, quotas, or throttling policies. Access is
  through an authenticated enterprise web portal (platform.carbondirect.io)
  rather than a metered programmatic API. Any integration limits would be
  defined per enterprise agreement and are not publicly documented.
notes: >-
  reconciled is false because no public API exists and no rate-limit
  documentation is published. If Carbon Direct releases a developer API,
  reconcile this artifact with the documented RPM/quota values at that time.
