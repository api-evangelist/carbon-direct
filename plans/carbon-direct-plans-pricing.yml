description: >-
  Carbon Direct sells enterprise carbon management software and science
  advisory services on a custom, contact-sales basis. There is no public,
  self-serve, or usage-based pricing and no public developer API to meter.
  Engagements combine platform subscriptions with advisory services and
  high-quality carbon dioxide removal (CDR) procurement, all priced through
  negotiated enterprise agreements. No published price points are available.
notes: >-
  reconciled is false because Carbon Direct does not publish pricing and does
  not expose a public developer API. Pricing is enterprise / advisory and only
  available via sales. Update on reconciliation if Carbon Direct publishes
  rate cards or a self-serve product.
