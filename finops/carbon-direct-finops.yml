description: >-
  FinOps view of Carbon Direct spend. Carbon Direct sells enterprise carbon
  management software, science advisory, and high-quality carbon dioxide
  removal (CDR) procurement on a negotiated, contact-sales basis. There is no
  usage-based developer API billing to model; cost is driven by enterprise
  subscription, advisory engagement scope, and the volume and price of CDR
  credits procured. No public price points or usage meters are published.
notes: >-
  reconciled is false because Carbon Direct publishes no pricing and exposes no
  public metered API. Meters below are illustrative cost drivers for an
  enterprise carbon-management engagement, not documented billing units.
