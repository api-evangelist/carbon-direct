principles:
- name: Visibility
  description: Request itemized statements of platform subscription, advisory scope, and CDR credit volume from Carbon Direct.
- name: Allocation
  description: Map platform, advisory, and CDR procurement costs to climate program owners and cost centers.
- name: Optimization
  description: Right-size advisory scope and balance CDR portfolio across nature-based, hybrid, and engineered credits to fit budget and quality goals.
- name: Accountability
  description: Assign program owners; review CDR procurement and platform spend against the organization's climate budget.
